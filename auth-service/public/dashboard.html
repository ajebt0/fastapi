<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DASHBOARD</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div id="container-dashboard">
        <div id="user-info"></div>
        <div id="profile-form">
            <input type="text" id="full-name" placeholder="FULL NAME">
            <input type="text" id="bio" placeholder="DESCRIPTION / BIO">
            <input type="email" id="email" placeholder="EMAIL">
            
            <button id="register-btn" onclick="saveProfile()">SAVE PROFILE</button>
        </div>
        <button onclick="exit()" id="logout-btn">EXIT</button>
    </div>
   
    
    <script src="/dashboard.js"></script>
</body>
</html>
